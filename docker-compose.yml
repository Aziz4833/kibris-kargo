services:
  postgres:
    image: postgres:16
    container_name: kibris_kargo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kibris_kargo
      POSTGRES_USER: kibris_kargo
      POSTGRES_PASSWORD: kibris_kargo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kibris_kargo -d kibris_kargo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
