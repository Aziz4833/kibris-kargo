{% extends 'kargo/base.html' %}

{% block title %}Kayıt | Kıbrıs Kargo Pazarı{% endblock %}

{% block content %}
<section class="auth-wrap">
    <form class="auth-card" method="post">
        {% csrf_token %}
        <p class="eyebrow">Yeni hesap</p>
        <h1>Kayıt ol</h1>

        {% include 'kargo/partials/form_errors.html' with form=form %}

        <label>
            <span>E-posta</span>
            {{ form.email }}
        </label>
        <label>
            <span>Şifre</span>
            {{ form.password }}
        </label>
        <label>
            <span>Şifre tekrar</span>
            {{ form.password_tekrar }}
        </label>
        <button class="button primary full" type="submit">Hesap aç</button>
        <p class="auth-alt">Zaten hesabınız varsa <a href="{% url 'panel_giris' %}">giriş yapın</a>.</p>
    </form>
</section>
{% endblock %}
