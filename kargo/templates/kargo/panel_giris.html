{% extends 'kargo/base.html' %}

{% block title %}Panel Girişi | Kıbrıs Kargo Pazarı{% endblock %}

{% block content %}
<section class="auth-wrap">
    <form class="auth-card" method="post">
        {% csrf_token %}
        <p class="eyebrow">Çalışan girişi</p>
        <h1>Panel</h1>

        {% include 'kargo/partials/form_errors.html' with form=form %}

        <label>
            <span>E-posta</span>
            {{ form.email }}
        </label>
        <label>
            <span>Şifre</span>
            {{ form.password }}
        </label>
        <button class="button primary full" type="submit">Giriş yap</button>
    </form>
</section>
{% endblock %}
